name: build

# Run unit tests + go vet on every push and PR. Cross-compile sanity check
# on tag push runs in release.yml.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -count=1
      - name: build
        run: go build ./cmd/a2abridge
