name: build

# Run unit tests + go vet on every push and PR. Cross-compile sanity check
# on tag push runs in release.yml.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: vet
        run: go vet ./...
      # NOTE: golangci-lint is run locally (see .golangci.yml + CONTRIBUTING.md).
      # We re-enable it in CI once an upstream release is built against Go 1.25;
      # v1.64.x was the last release on Go 1.24 and refuses any project with
      # `go 1.25` in go.mod. Tracked in v2.1 roadmap.
      - name: test
        run: go test ./... -race -count=1
      - name: build
        run: go build ./cmd/a2abridge
